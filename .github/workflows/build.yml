name: Build ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Docker image
        run: ./gradlew dockerBuild

      - name: Build ISO
        run: ./gradlew isoBuild

      - name: Verify ISO
        run: ./gradlew isoVerify

      - name: Test boot
        run: ./gradlew isoTestBoot

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: magic_stick_iso
          path: build/magic_stick_0.1.0.iso
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/magic_stick_0.1.0.iso
          generate_release_notes: true