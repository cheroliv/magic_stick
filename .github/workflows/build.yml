name: Build ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:



jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Docker image
        run: ./gradlew dockerBuild

      - name: Build ISO
        run: ./gradlew isoBuild

      - name: Verify ISO
        run: ./gradlew isoVerify

      - name: Test boot
        run: ./gradlew isoTestBoot

      - name: Test software in ISO
        run: ./gradlew isoTestSoftware

      - name: Test A/B partition setup
        # SKIP: Les runners GitHub Actions ne sont pas privileged (loop devices interdits).
        # Le test isoTestAB complet necessite un runner self-hosted avec Docker --privileged.
        # Voir .agents/AB_PARTITION_REFERENCE.adoc -- CI/CD Limitations.
        # Executer localement: ./gradlew isoTestAB
        if: false
        run: ./gradlew isoTestAB

      - name: Mock test A/B + persistence (non-privileged CI/CD)
        run: |
          bash -n scripts/test-ab-partition.sh
          bash -n scripts/update-system.sh
          ./gradlew tasks --all | grep -q isoTestAB && echo "  task isoTestAB present"
          bash scripts/test-persistence-mock.sh scripts/update-system.sh

      - name: Get version from VERSION file
        id: version
        run: echo "version=$(head -n 1 VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set version environment
        run: echo "MAGIC_STICK_VERSION=${{ steps.version.outputs.version }}" >> "$GITHUB_ENV"

      - name: Generate ISO checksum
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build
          ISO_NAME="magic_stick_${{ env.MAGIC_STICK_VERSION }}.iso"
          sha256sum "${ISO_NAME}" > "${ISO_NAME}.sha256"
          cat "${ISO_NAME}.sha256"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: magic_stick_iso
          path: build/magic_stick_${{ env.MAGIC_STICK_VERSION }}.iso*
          retention-days: 30

      - name: Deploy ISO to SourceForge
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_KNOWN_HOSTS: ${{ secrets.SF_KNOWN_HOSTS }}
          MAGIC_STICK_VERSION: ${{ env.MAGIC_STICK_VERSION }}
        run: |
          mkdir -p ~/.ssh
          echo "$SF_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SF_KNOWN_HOSTS" > ~/.ssh/known_hosts
          ISO_NAME="magic_stick_${MAGIC_STICK_VERSION}.iso"
          SHA_FILE="${ISO_NAME}.sha256"
          rsync -avz --progress \
            "build/${ISO_NAME}" \
            "build/${SHA_FILE}" \
            ${SF_USERNAME}@frs.sourceforge.net:/home/frs/project/magic-stick/magic-stick/

  docker-hub:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from VERSION file
        id: version
        run: echo "version=$(head -n 1 VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/magic-stick-cli/Dockerfile
          push: true
          tags: |
            cheroliv/magic-stick-cli:${{ steps.version.outputs.version }}
            cheroliv/magic-stick-cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm "cheroliv/magic-stick-cli:${{ steps.version.outputs.version }}" bash -c "
            set -e
            ollama --version
            python3 --version
            uv --version
            xh --version
            java -version 2>\u00261
          "