name: Build ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:



jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Docker image
        run: ./gradlew dockerBuild

      - name: Build ISO
        run: ./gradlew isoBuild

      - name: Verify ISO
        run: ./gradlew isoVerify

      - name: Test boot
        run: ./gradlew isoTestBoot

      - name: Test A/B partition setup
        if: github.event_name != 'pull_request'
        run: ./gradlew isoTestAB

      - name: Generate ISO checksum
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build
          sha256sum magic_stick_0.1.0.iso > magic_stick_0.1.0.iso.sha256
          cat magic_stick_0.1.0.iso.sha256

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: magic_stick_iso
          path: build/magic_stick_0.1.0.iso*
          retention-days: 30

      - name: Deploy ISO to SourceForge
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_KNOWN_HOSTS: ${{ secrets.SF_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SF_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SF_KNOWN_HOSTS" > ~/.ssh/known_hosts
          rsync -avz --progress \
            build/magic_stick_0.1.0.iso \
            build/magic_stick_0.1.0.iso.sha256 \
            ${SF_USERNAME}@frs.sourceforge.net:/home/frs/project/magic-stick/magic-stick/