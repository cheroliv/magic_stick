name: Release Magic Stick

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GH_PAT (Personal Access Token) required to trigger other workflows (build.yml)
          # on tag push. GITHUB_TOKEN cannot trigger downstream workflows per GitHub policy.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current
        run: echo "version=$(head -n 1 VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ github.event.inputs.bump }}"

          # Parse semver
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT -> $NEW_VERSION ($BUMP)"
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit VERSION bump
        run: |
          git add VERSION
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:main

      - name: Create Git tag
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"
          echo "Tag v${{ steps.bump.outputs.new_version }} pushed — build.yml will trigger automatically on tag push"
