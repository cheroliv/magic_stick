name: Publish website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Inject site config
        run: echo "${{ secrets.BAKERY_GRADLE_PLUGIN }}" > site.yml

      - name: Debug site.yml
        run: cat site.yml

      - name: Push website
        run: ./gradlew -q -s publishSite